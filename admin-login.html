<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Venancia Consultancy Pty Ltd</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --login-primary: #FF8A00;
            --login-dark: #1A1A1A;
            --login-bg: #f0f2f5;
        }

        body {
            background: var(--login-bg);
            background: radial-gradient(circle at top left, #ffffff 0%, #e0e0e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: var(--font-body);
        }

        .login-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            background: var(--white);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            position: relative;
        }

        /* Brand Side */
        .brand-side {
            flex: 1;
            background: var(--login-dark);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .brand-side::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 184, 0, 0.1) 0%, transparent 70%);
            z-index: 1;
        }

        .brand-side::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 138, 0, 0.05) 0%, transparent 70%);
            z-index: 1;
        }

        .logo-wrapper {
            position: relative;
            z-index: 2;
            margin-bottom: 40px;
        }

        .logo-circle {
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 50%;
            padding: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-circle img {
            width: 100%;
            height: auto;
        }

        .brand-text {
            position: z-index: 2;
        }

        .brand-text h1 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: white;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .brand-text p {
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
            max-width: 300px;
            margin: 0 auto;
        }

        /* Form Side */
        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-header h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .form-header p {
            color: var(--dark-grey);
            opacity: 0.6;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--dark);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ccc;
            transition: var(--transition);
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: var(--transition);
            background: #fafafa;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-dark);
            background: white;
            box-shadow: 0 10px 20px rgba(255, 138, 0, 0.05);
        }

        .input-wrapper input:focus + i {
            color: var(--primary-dark);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 25px rgba(255, 138, 0, 0.3);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 138, 0, 0.4);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        .back-link {
            margin-top: 30px;
            text-align: center;
        }

        .back-link a {
            color: var(--dark-grey);
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            opacity: 0.6;
        }

        .back-link a:hover {
            opacity: 1;
            color: var(--primary-dark);
        }

        .error-toast {
            background: #ff5252;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .login-container {
                flex-direction: column;
                max-width: 500px;
            }
            .brand-side {
                padding: 40px;
            }
            .form-side {
                padding: 40px;
            }
            .logo-circle {
                width: 100px;
                height: 100px;
            }
            .brand-text h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- Brand Side -->
        <div class="brand-side">
            <div class="logo-wrapper">
                <div class="logo-circle">
                    <img src="assets/logo.png" alt="Venancia Logo">
                </div>
            </div>
            <div class="brand-text">
                <h1>Venancia<br>Consultancy</h1>
                <p>Empowering your global journey with expert consultancy.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="form-side">
            <div class="form-header">
                <h2>Admin Access</h2>
                <p>Welcome back! Please login to manage your insights.</p>
            </div>

            <div id="login-error" class="error-toast">
                <i class="fas fa-exclamation-circle"></i>
                <span>Invalid credentials. Please try again.</span>
            </div>

            <form id="admin-login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="email" id="email" required placeholder="admin@venancia.com.au">
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required placeholder="••••••••">
                        <i class="fas fa-eye toggle-password" id="toggle-password" style="position: absolute; right: 15px; left: auto; cursor: pointer; color: #ccc;"></i>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">
                    <span>Login to Dashboard</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-long-arrow-alt-left"></i>
                    Back to Main Website
                </a>
            </div>
        </div>
    </div>

    <script src="/api-base.js"></script>
    <script src="/supabase-auth.js"></script>
    <script>
        const form = document.getElementById('admin-login-form');
        const errorMsg = document.getElementById('login-error');
        const submitBtn = form.querySelector('button[type="submit"]');

        const showError = (message) => {
            errorMsg.querySelector('span').innerText = message;
            errorMsg.style.display = 'flex';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 3000);
        };

        const auth = window.VenanciaSupabaseAuth || {
            async getConfig() {
                if (window.VENANCIA_RUNTIME_CONFIG) {
                    return window.VENANCIA_RUNTIME_CONFIG;
                }

                const apiBaseUrl = window.VenanciaApiBaseUrl || '';
                const response = await fetch(`${apiBaseUrl}/api/config`, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Unable to load authentication config (${response.status}).`);
                }

                return response.json();
            },
            async signInWithPassword(email, password) {
                const config = await this.getConfig();

                if (!config.authEnabled) {
                    throw new Error('Supabase Auth is not configured for this environment.');
                }

                const response = await fetch(`${config.supabaseUrl}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        apikey: config.supabaseAnonKey,
                        Authorization: `Bearer ${config.supabaseAnonKey}`
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error_description || data.msg || data.error || 'Unable to sign in.');
                }

                localStorage.setItem('venancia_supabase_session', JSON.stringify(data));
                return data;
            },
            async requireSession() {
                return null;
            }
        };

        window.VenanciaSupabaseAuth = auth;

        document.addEventListener('DOMContentLoaded', async () => {
            // Password toggle logic
            const togglePassword = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');

            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });

            const session = await auth.requireSession().catch((error) => {
                showError(error.message || 'Unable to load authentication config.');
                return null;
            });
            if (session) {
                window.location.href = 'admin-dashboard.html';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.innerText = 'Signing in...';

            try {
                await auth.signInWithPassword(email, pass);
                window.location.href = 'admin-dashboard.html';
            } catch (error) {
                showError(error.message || 'Invalid credentials. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Login to Dashboard';
            }
        });
    </script>
</body>

</html>
